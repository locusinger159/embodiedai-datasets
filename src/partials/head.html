{{META}}
<link rel="icon" type="image/png" href="/机器人.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary-start: #5B7CFF; --primary-end: #3B5BDB; --accent: #00D2FF;
  --dark-bg: #0F172A; --dark-secondary: #1E293B; --light-bg: #F8FAFC;
  --white: #FFFFFF; --text-primary: #1E293B; --text-secondary: #64748B;
  --text-light: #94A3B8; --border: #E2E8F0; --success: #10B981; --warning: #F59E0B; --error: #EF4444;
  --gradient-primary: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
}
html { scroll-behavior: smooth; }
body { font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text-primary); line-height:1.6; background: var(--white); }
a { text-decoration:none; color:inherit; }
img { max-width:100%; display:block; }
.navbar { position:fixed; top:0; left:0; right:0; height:64px; background:rgba(15,23,42,0.95); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,0.1); z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:0 48px; }
.nav-logo { display:flex; align-items:center; gap:12px; font-weight:700; font-size:18px; color:var(--white); }
.nav-logo img { width:36px; height:36px; border-radius:8px; }
.nav-menu { display:flex; align-items:center; gap:32px; }
.nav-link { color:rgba(255,255,255,0.8); font-weight:500; font-size:15px; transition:color 0.3s; position:relative; }
.nav-link:hover { color:var(--white); }
.nav-link.active { color:var(--accent); }
.nav-link::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:2px; background:var(--accent); transition:width 0.3s; }
.nav-link:hover::after, .nav-link.active::after { width:100%; }
.nav-actions { display:flex; align-items:center; gap:16px; }
.nav-icon { width:40px; height:40px; border-radius:10px; background:rgba(255,255,255,0.1); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; color:var(--white); }
.nav-icon:hover { background:rgba(255,255,255,0.2); transform:scale(1.05); }
.nav-icon svg { width:20px; height:20px; }
.hero { min-height:100vh; background:linear-gradient(180deg, var(--dark-bg) 0%, var(--dark-secondary) 100%); position:relative; overflow:hidden; display:flex; align-items:center; padding:120px 48px 80px; }
.hero::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 20% 80%, rgba(91,124,255,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(0,210,255,0.1) 0%, transparent 50%); animation:heroGlow 15s ease-in-out infinite; }
@keyframes heroGlow { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(2%,-2%) rotate(1deg)} 66%{transform:translate(-1%,1%) rotate(-1deg)} }
.hero-content { max-width:1400px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; position:relative; z-index:1; }
.hero-text { color:var(--white); }
.hero-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; background:rgba(91,124,255,0.2); border:1px solid rgba(91,124,255,0.3); border-radius:50px; font-size:14px; font-weight:500; color:var(--accent); margin-bottom:24px; animation:fadeInUp 0.6s ease; }
.hero-badge::before { content:''; width:8px; height:8px; background:var(--success); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.2)} }
.hero-title { font-size:56px; font-weight:800; line-height:1.2; margin-bottom:24px; animation:fadeInUp 0.6s ease 0.1s both; }
.hero-title span { background:var(--gradient-primary); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.hero-subtitle { font-size:20px; color:rgba(255,255,255,0.7); margin-bottom:40px; animation:fadeInUp 0.6s ease 0.2s both; }
.hero-stats { display:flex; gap:48px; margin-bottom:40px; animation:fadeInUp 0.6s ease 0.3s both; }
.stat-item { text-align:left; }
.stat-number { font-family:'Inter',sans-serif; font-size:42px; font-weight:800; color:var(--white); line-height:1; }
.stat-number .accent { color:var(--accent); }
.stat-label { font-size:14px; color:rgba(255,255,255,0.6); margin-top:8px; }
.hero-cta { display:flex; gap:16px; animation:fadeInUp 0.6s ease 0.4s both; }
.btn { display:inline-flex; align-items:center; gap:8px; padding:14px 28px; font-size:16px; font-weight:600; border-radius:12px; cursor:pointer; transition:all 0.3s; border:none; font-family:inherit; }
.btn-primary { background:var(--gradient-primary); color:var(--white); box-shadow:0 4px 20px rgba(91,124,255,0.4); }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(91,124,255,0.5); }
.btn-secondary { background:rgba(255,255,255,0.1); color:var(--white); border:1px solid rgba(255,255,255,0.2); }
.btn-secondary:hover { background:rgba(255,255,255,0.2); transform:translateY(-2px); }
.btn svg { width:20px; height:20px; }
.hero-mascot { display:flex; justify-content:center; align-items:center; animation:fadeInUp 0.8s ease 0.2s both; }
.mascot-container { position:relative; width:400px; height:400px; }
.mascot-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:350px; height:350px; background:radial-gradient(circle, rgba(91,124,255,0.3) 0%, transparent 70%); border-radius:50%; animation:glowPulse 4s ease-in-out infinite; }
@keyframes glowPulse { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6} 50%{transform:translate(-50%,-50%) scale(1.1);opacity:0.8} }
.mascot-robot { position:relative; z-index:1; animation:robotFloat 4s ease-in-out infinite; }
@keyframes robotFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
.particles { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
.particle { position:absolute; width:6px; height:6px; background:var(--accent); border-radius:50%; opacity:0.6; animation:floatParticle 8s ease-in-out infinite; }
.particle:nth-child(1){left:10%;top:20%;animation-delay:0s} .particle:nth-child(2){left:20%;top:80%;animation-delay:1s} .particle:nth-child(3){left:80%;top:30%;animation-delay:2s} .particle:nth-child(4){left:70%;top:70%;animation-delay:3s} .particle:nth-child(5){left:40%;top:10%;animation-delay:4s} .particle:nth-child(6){left:90%;top:60%;animation-delay:5s}
@keyframes floatParticle { 0%,100%{transform:translateY(0) rotate(0deg);opacity:0.6} 50%{transform:translateY(-30px) rotate(180deg);opacity:0.3} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
.section { padding:100px 48px; }
.section-light { background:var(--light-bg); }
.section-header { text-align:center; max-width:800px; margin:0 auto 60px; }
.section-tag { display:inline-block; padding:6px 16px; background:rgba(91,124,255,0.1); color:var(--primary-start); font-size:14px; font-weight:600; border-radius:50px; margin-bottom:16px; }
.section-title { font-size:42px; font-weight:700; color:var(--text-primary); margin-bottom:16px; }
.section-desc { font-size:18px; color:var(--text-secondary); }
.features-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:32px; max-width:1200px; margin:0 auto; }
.feature-card { background:var(--white); border-radius:20px; padding:40px; border:1px solid var(--border); text-align:center; transition:all 0.3s; }
.feature-card:hover { transform:translateY(-8px); box-shadow:0 20px 50px rgba(91,124,255,0.12); border-color:transparent; }
.feature-icon { width:80px; height:80px; margin:0 auto 24px; background:var(--gradient-primary); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:36px; color:var(--white); }
.feature-title { font-size:22px; font-weight:700; margin-bottom:12px; }
.feature-desc { font-size:15px; color:var(--text-secondary); line-height:1.7; }
.partners-wrap { padding:80px 48px; background:var(--white); text-align:center; }
.partners-title { font-size:1.2rem; font-weight:600; color:var(--text-secondary); margin-bottom:1.5rem; }
.partners-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; max-width:1200px; margin:0 auto; }
.partner-item { padding:10px 24px; background:var(--light-bg); border-radius:10px; font-size:0.95rem; color:var(--text-secondary); transition:all 0.2s; }
.partner-item:hover { transform:scale(1.03); box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.footer { background:var(--dark-bg); color:var(--white); padding:80px 48px 40px; }
.footer-content { max-width:1400px; margin:0 auto; display:grid; grid-template-columns:2fr 1fr 1fr; gap:60px; }
.footer-brand p { color:rgba(255,255,255,0.7); line-height:1.8; margin:16px 0 20px; }
.footer-logo { display:flex; align-items:center; gap:12px; font-weight:700; font-size:20px; }
.footer-logo img { width:40px; height:40px; border-radius:8px; }
.footer-section h4 { font-size:16px; font-weight:600; margin-bottom:20px; }
.footer-links { display:flex; flex-direction:column; gap:12px; }
.footer-link { font-size:14px; color:rgba(255,255,255,0.6); transition:color 0.2s; }
.footer-link:hover { color:var(--accent); }
.footer-bottom { max-width:1400px; margin:60px auto 0; padding-top:30px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center; }
.footer-copyright { font-size:14px; color:rgba(255,255,255,0.5); }
.footer-disclaimer { font-size:13px; color:rgba(255,255,255,0.4); max-width:600px; text-align:right; }
.scroll-animate { opacity:0; transform:translateY(40px); transition:all 0.8s cubic-bezier(0.4,0,0.2,1); }
.scroll-animate.visible { opacity:1; transform:translateY(0); }
.main-container { max-width:1400px; margin:0 auto; padding:100px 48px 60px; }
.page-header { margin-bottom:32px; }
.page-title { font-size:36px; font-weight:700; margin-bottom:8px; }
.page-stats { display:flex; align-items:center; gap:24px; color:var(--text-secondary); font-size:15px; }
.stat-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; background:rgba(91,124,255,0.1); color:var(--primary-start); border-radius:50px; font-weight:600; }
@media (max-width:1200px) { .hero-content{grid-template-columns:1fr;text-align:center;gap:60px} .hero-stats{justify-content:center} .stat-item{text-align:center} .hero-cta{justify-content:center} .hero-mascot{order:-1} .mascot-container{width:300px;height:300px} .features-grid{grid-template-columns:repeat(2,1fr)} .footer-content{grid-template-columns:1fr 1fr} }
@media (max-width:768px) { .navbar{padding:0 24px} .nav-menu{display:none} .hero{padding:100px 24px 60px;min-height:auto} .hero-title{font-size:36px} .hero-stats{flex-wrap:wrap;gap:32px} .stat-number{font-size:32px} .section{padding:60px 24px} .section-title{font-size:32px} .features-grid{grid-template-columns:1fr} .footer-content{grid-template-columns:1fr;gap:40px} .footer-bottom{flex-direction:column;gap:16px;text-align:center} .footer-disclaimer{text-align:center} .main-container{padding:90px 24px 40px} }
</style>
