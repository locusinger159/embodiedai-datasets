{{META}}
<link rel="icon" type="image/png" href="/机器人.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #5B7CFF; --primary-dark: #3B5BDB; --accent: #00D2FF;
  --dark-bg: #0B0F1A; --dark-secondary: #151B2B; --light-bg: #F8FAFC;
  --white: #FFFFFF; --text-primary: #0F172A; --text-secondary: #64748B;
  --text-light: #94A3B8; --border: #E2E8F0; --success: #10B981; --warning: #F59E0B;
  --gradient-primary: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
}
html { scroll-behavior: smooth; }
body { font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text-primary); line-height:1.6; overflow-x:hidden; background: var(--light-bg); }
a { text-decoration:none; color:inherit; }
img { max-width:100%; display:block; }

/* Navbar */
.navbar { position:fixed; top:0; left:0; right:0; height:72px; background:rgba(11,15,26,0.85); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.08); z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:0 48px; transition:all 0.3s; }
.nav-logo { display:flex; align-items:center; gap:12px; font-weight:700; font-size:18px; color:var(--white); }
.nav-logo img { width:40px; height:40px; border-radius:8px; }
.nav-menu { display:flex; align-items:center; gap:40px; }
.nav-link { color:rgba(255,255,255,0.7); font-weight:500; font-size:15px; transition:all 0.3s; position:relative; padding:8px 0; }
.nav-link:hover { color:var(--white); }
.nav-link.active { color:var(--accent); }
.nav-link.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--accent); border-radius:2px; }
.nav-cta { display:flex; align-items:center; gap:16px; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; font-size:14px; font-weight:600; border-radius:10px; cursor:pointer; transition:all 0.3s; border:none; font-family:inherit; }
.btn-primary { background:var(--gradient-primary); color:var(--white); box-shadow:0 4px 15px rgba(91,124,255,0.4); }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(91,124,255,0.5); }
.btn-ghost { background:rgba(255,255,255,0.1); color:var(--white); border:1px solid rgba(255,255,255,0.2); }
.btn-ghost:hover { background:rgba(255,255,255,0.15); }
.btn-secondary { background:var(--white); color:var(--text-primary); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--primary); color:var(--primary); }

/* Page Hero */
.page-hero { background:var(--dark-bg); padding:140px 48px 60px; position:relative; overflow:hidden; }
.page-hero::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background-image:linear-gradient(rgba(91,124,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(91,124,255,0.03) 1px, transparent 1px); background-size:60px 60px; mask-image:radial-gradient(ellipse at center, black 0%, transparent 70%); }
.page-hero-content { max-width:1400px; margin:0 auto; position:relative; z-index:1; }
.page-hero-title { font-size:42px; font-weight:800; color:var(--white); margin-bottom:12px; }
.page-hero-subtitle { font-size:18px; color:rgba(255,255,255,0.6); margin-bottom:32px; }
.page-hero-content.centered { max-width:800px; text-align:center; }

/* Search in hero */
.search-bar { display:flex; gap:16px; max-width:700px; }
.search-input-wrapper { flex:1; position:relative; }
.search-input { width:100%; padding:14px 20px 14px 48px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; color:var(--white); font-size:15px; font-family:inherit; transition:all 0.3s; }
.search-input::placeholder { color:rgba(255,255,255,0.4); }
.search-input:focus { outline:none; border-color:var(--primary); background:rgba(255,255,255,0.15); }
.search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.4); }
.search-btn { padding:14px 28px; background:var(--gradient-primary); color:var(--white); border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s; font-family:inherit; }
.search-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(91,124,255,0.4); }

/* Homepage Hero */
.hero { min-height:100vh; background:linear-gradient(180deg, var(--dark-bg) 0%, var(--dark-secondary) 100%); position:relative; overflow:hidden; display:flex; align-items:center; padding:120px 48px 80px; }
.hero::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 20% 80%, rgba(91,124,255,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(0,210,255,0.1) 0%, transparent 50%); animation:heroGlow 15s ease-in-out infinite; }
@keyframes heroGlow { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(2%,-2%) rotate(1deg)} 66%{transform:translate(-1%,1%) rotate(-1deg)} }
.hero-content { max-width:1400px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; position:relative; z-index:1; }
.hero-text { color:var(--white); }
.hero-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; background:rgba(91,124,255,0.2); border:1px solid rgba(91,124,255,0.3); border-radius:50px; font-size:14px; font-weight:500; color:var(--accent); margin-bottom:24px; animation:fadeInUp 0.6s ease; }
.hero-badge::before { content:''; width:8px; height:8px; background:var(--success); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.2)} }
.hero-title { font-size:56px; font-weight:800; line-height:1.2; margin-bottom:24px; animation:fadeInUp 0.6s ease 0.1s both; }
.hero-title span { background:var(--gradient-primary); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.hero-subtitle { font-size:20px; color:rgba(255,255,255,0.7); margin-bottom:40px; animation:fadeInUp 0.6s ease 0.2s both; }
.hero-stats { display:flex; gap:48px; margin-bottom:40px; animation:fadeInUp 0.6s ease 0.3s both; }
.stat-item { text-align:left; }
.stat-number { font-family:'Inter',sans-serif; font-size:42px; font-weight:800; color:var(--white); line-height:1; }
.stat-number .accent { color:var(--accent); }
.stat-label { font-size:14px; color:rgba(255,255,255,0.6); margin-top:8px; }
.hero-cta { display:flex; gap:16px; animation:fadeInUp 0.6s ease 0.4s both; }
.hero-mascot { display:flex; justify-content:center; align-items:center; animation:fadeInUp 0.8s ease 0.2s both; }
.mascot-container { position:relative; width:400px; height:400px; }
.mascot-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:350px; height:350px; background:radial-gradient(circle, rgba(91,124,255,0.3) 0%, transparent 70%); border-radius:50%; animation:glowPulse 4s ease-in-out infinite; }
@keyframes glowPulse { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6} 50%{transform:translate(-50%,-50%) scale(1.1);opacity:0.8} }
.mascot-robot { position:relative; z-index:1; animation:robotFloat 4s ease-in-out infinite; }
@keyframes robotFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
.particles { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
.particle { position:absolute; width:6px; height:6px; background:var(--accent); border-radius:50%; opacity:0.6; animation:floatParticle 8s ease-in-out infinite; }
.particle:nth-child(1){left:10%;top:20%;animation-delay:0s} .particle:nth-child(2){left:20%;top:80%;animation-delay:1s} .particle:nth-child(3){left:80%;top:30%;animation-delay:2s} .particle:nth-child(4){left:70%;top:70%;animation-delay:3s} .particle:nth-child(5){left:40%;top:10%;animation-delay:4s} .particle:nth-child(6){left:90%;top:60%;animation-delay:5s}
@keyframes floatParticle { 0%,100%{transform:translateY(0) rotate(0deg);opacity:0.6} 50%{transform:translateY(-30px) rotate(180deg);opacity:0.3} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

/* Sections */
.section { padding:100px 48px; }
.section-light { background:var(--light-bg); }
.section-header { text-align:center; max-width:800px; margin:0 auto 60px; }
.section-tag { display:inline-block; padding:6px 16px; background:rgba(91,124,255,0.1); color:var(--primary); font-size:14px; font-weight:600; border-radius:50px; margin-bottom:16px; }
.section-title { font-size:42px; font-weight:700; color:var(--text-primary); margin-bottom:16px; }
.section-desc { font-size:18px; color:var(--text-secondary); }

/* Features */
.features-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:32px; max-width:1200px; margin:0 auto; }
.feature-card { background:var(--white); border-radius:20px; padding:40px; border:1px solid var(--border); text-align:center; transition:all 0.3s; }
.feature-card:hover { transform:translateY(-8px); box-shadow:0 20px 50px rgba(91,124,255,0.12); border-color:transparent; }
.feature-icon { width:80px; height:80px; margin:0 auto 24px; background:var(--gradient-primary); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:36px; color:var(--white); transition:transform 0.3s; }
.feature-card:hover .feature-icon { transform:scale(1.1) rotate(5deg); }
.feature-title { font-size:22px; font-weight:700; margin-bottom:12px; }
.feature-desc { font-size:15px; color:var(--text-secondary); line-height:1.7; }

/* Partners */
.partners-wrap { padding:80px 48px; background:var(--white); text-align:center; }
.partners-title { font-size:1.2rem; font-weight:600; color:var(--text-secondary); margin-bottom:1.5rem; }
.partners-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; max-width:1200px; margin:0 auto; }
.partner-item { padding:10px 24px; background:var(--light-bg); border-radius:10px; font-size:0.95rem; color:var(--text-secondary); transition:all 0.2s; }
.partner-item:hover { transform:scale(1.03); box-shadow:0 2px 12px rgba(0,0,0,0.06); }

/* Filter bar */
.filter-section { padding:32px 48px; background:var(--white); border-bottom:1px solid var(--border); position:sticky; top:72px; z-index:100; }
.filter-content { max-width:1400px; margin:0 auto; }
.filter-row { display:flex; flex-wrap:wrap; gap:24px; align-items:flex-start; }
.filter-group { display:flex; flex-direction:column; gap:10px; }
.filter-label { font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; }
.filter-chips { display:flex; flex-wrap:wrap; gap:8px; }
.filter-chip { padding:8px 16px; background:var(--light-bg); border:1px solid var(--border); border-radius:20px; font-size:14px; color:var(--text-secondary); cursor:pointer; transition:all 0.2s; font-family:inherit; }
.filter-chip:hover { border-color:var(--primary); color:var(--primary); }
.filter-chip.active { background:var(--gradient-primary); color:var(--white); border-color:transparent; }
.filter-actions { margin-left:auto; display:flex; gap:12px; align-items:center; }
.sort-select { padding:10px 16px; background:var(--white); border:1px solid var(--border); border-radius:10px; font-size:14px; color:var(--text-primary); cursor:pointer; font-family:inherit; }
.clear-filters { padding:10px 16px; background:transparent; border:1px solid var(--border); border-radius:10px; font-size:14px; color:var(--text-secondary); cursor:pointer; transition:all 0.2s; font-family:inherit; }
.clear-filters:hover { border-color:var(--primary); color:var(--primary); }

/* View toggle */
.view-toggle { display:flex; background:var(--light-bg); border-radius:10px; padding:4px; border:1px solid var(--border); }
.view-btn { padding:8px 12px; background:transparent; border:none; border-radius:8px; cursor:pointer; color:var(--text-secondary); transition:all 0.2s; }
.view-btn.active { background:var(--white); color:var(--primary); box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.view-btn svg { width:18px; height:18px; }

/* Table */
.table-view { background:var(--white); border-radius:16px; border:1px solid var(--border); overflow:hidden; }
.d-table { width:100%; border-collapse:collapse; }
.d-table th { padding:14px 16px; text-align:left; font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; background:var(--light-bg); border-bottom:1px solid var(--border); white-space:nowrap; }
.d-table th.sortable { cursor:pointer; user-select:none; }
.d-table th.sortable:hover { color:var(--primary); }
.d-table td { padding:16px; border-bottom:1px solid var(--border); font-size:14px; vertical-align:middle; }
.d-table tr:last-child td { border-bottom:none; }
.d-table tbody tr:hover td { background:rgba(91,124,255,0.03); }
.data-name-cell { font-weight:600; color:var(--text-primary); display:flex; align-items:center; gap:12px; }
.data-name-cell:hover { color:var(--primary); }
.data-icon { width:40px; height:40px; background:var(--gradient-primary); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--white); flex-shrink:0; }
.data-icon svg { width:20px; height:20px; }
.data-org { color:var(--text-secondary); }
.type-badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
.type-open { background:rgba(16,185,129,0.1); color:var(--success); }
.type-partial { background:rgba(245,158,11,0.1); color:var(--warning); }
.type-closed { background:rgba(239,68,68,0.1); color:var(--warning); }
.data-tags { display:flex; gap:4px; flex-wrap:wrap; }
.data-tag { padding:3px 8px; background:var(--light-bg); border:1px solid var(--border); border-radius:5px; font-size:11px; color:var(--text-secondary); white-space:nowrap; }
.card-tag { background:rgba(91,124,255,0.08); border-color:rgba(91,124,255,0.2); color:var(--primary); }
.data-links { display:flex; gap:6px; }
.link-btn { padding:6px 12px; background:var(--light-bg); border:1px solid var(--border); border-radius:7px; font-size:12px; color:var(--text-secondary); transition:all 0.2s; display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
.link-btn:hover { border-color:var(--primary); color:var(--primary); background:rgba(91,124,255,0.05); }
.link-btn svg { width:12px; height:12px; }

/* Cards */
.card-view { display:none; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:24px; }
.card-view.active { display:grid; }
.data-card { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:24px; transition:all 0.3s; }
.data-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.08); border-color:rgba(91,124,255,0.3); }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.card-title { font-size:18px; font-weight:700; margin-bottom:4px; }
.card-org { font-size:14px; color:var(--text-secondary); }
.card-desc { font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:14px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.card-meta-item { display:flex; align-items:center; gap:4px; font-size:13px; color:var(--text-secondary); }
.card-meta-item svg { width:14px; height:14px; }
.card-footer { display:flex; justify-content:space-between; align-items:center; padding-top:14px; border-top:1px solid var(--border); }

/* Pagination */
.pagination { display:flex; justify-content:center; align-items:center; gap:8px; margin-top:48px; }
.page-btn { min-width:40px; height:40px; padding:0 12px; background:var(--white); border:1px solid var(--border); border-radius:10px; font-size:14px; color:var(--text-secondary); cursor:pointer; transition:all 0.2s; font-family:inherit; display:flex; align-items:center; justify-content:center; }
.page-btn:hover { border-color:var(--primary); color:var(--primary); }
.page-btn.active { background:var(--gradient-primary); color:var(--white); border-color:transparent; }
.page-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* Dataset section */
.datasets-section { padding:40px 48px 80px; max-width:1400px; margin:0 auto; }

/* Compare bar */
.compare-bar { position:fixed; bottom:-80px; left:50%; transform:translateX(-50%); background:var(--dark-bg); border:1px solid rgba(91,124,255,0.3); border-radius:16px; padding:16px 28px; display:flex; align-items:center; gap:20px; z-index:999; transition:bottom 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow:0 12px 40px rgba(0,0,0,0.4); backdrop-filter:blur(20px); }
.compare-bar.visible { bottom:32px; }
.compare-bar-text { color:var(--white); font-size:14px; font-weight:500; }
.compare-bar-text span { color:var(--accent); font-weight:700; }
.compare-bar-btn { padding:10px 24px; background:var(--gradient-primary); color:var(--white); border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.compare-bar-btn:hover { box-shadow:0 4px 15px rgba(91,124,255,0.5); }
.compare-bar-btn:disabled { opacity:0.4; cursor:not-allowed; }
.compare-clear-btn { padding:8px 16px; background:rgba(255,255,255,0.1); color:var(--white); border:1px solid rgba(255,255,255,0.2); border-radius:8px; font-size:13px; cursor:pointer; font-family:inherit; }

/* Compare modal */
.compare-modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:2000; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.compare-modal-overlay.visible { display:flex; }
.compare-modal { background:var(--white); border-radius:20px; width:90%; max-width:1100px; max-height:85vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,0.3); }
.compare-modal-header { padding:28px 32px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--white); z-index:1; border-radius:20px 20px 0 0; }
.compare-modal-title { font-size:22px; font-weight:700; }
.compare-close-btn { width:40px; height:40px; background:var(--light-bg); border:1px solid var(--border); border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; color:var(--text-secondary); transition:all 0.2s; }
.compare-close-btn:hover { background:#fee2e2; color:#EF4444; border-color:#EF4444; }
.compare-table { width:100%; border-collapse:collapse; }
.compare-table th, .compare-table td { padding:14px 20px; text-align:left; border-bottom:1px solid var(--border); font-size:14px; }
.compare-table th { background:var(--light-bg); font-weight:600; color:var(--text-secondary); font-size:13px; text-transform:uppercase; letter-spacing:0.5px; }
.compare-table .comp-field { font-weight:600; color:var(--text-secondary); white-space:nowrap; width:140px; }
.comp-diff { background:rgba(91,124,255,0.06); font-weight:500; }
.comp-same { transition:opacity 0.2s; }

/* Standards specific */
.std-checkbox { width:18px; height:18px; accent-color:var(--primary); cursor:pointer; }
.std-card-checkbox { position:absolute; top:16px; right:16px; width:18px; height:18px; accent-color:var(--primary); cursor:pointer; }
.selected td { background:rgba(91,124,255,0.08); }
.std-type-badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
.type-format { background:rgba(91,124,255,0.1); color:var(--primary); }
.type-benchmark { background:rgba(139,92,246,0.1); color:#8B5CF6; }
.type-industry { background:rgba(16,185,129,0.1); color:var(--success); }
.type-closed-std { background:rgba(239,68,68,0.1); color:#EF4444; }

/* Submit page specific */
.submit-section { padding:60px 48px; max-width:1000px; margin:0 auto; }
.method-tabs { display:flex; gap:16px; margin-bottom:40px; justify-content:center; }
.method-tab { padding:16px 32px; background:var(--white); border:2px solid var(--border); border-radius:12px; font-size:16px; font-weight:600; color:var(--text-secondary); cursor:pointer; transition:all 0.3s; font-family:inherit; display:flex; align-items:center; gap:12px; }
.method-tab:hover { border-color:var(--primary); color:var(--primary); }
.method-tab.active { background:var(--gradient-primary); color:var(--white); border-color:transparent; box-shadow:0 8px 25px rgba(91,124,255,0.3); }
.method-tab svg { width:24px; height:24px; }
.method-content { display:none; }
.method-content.active { display:block; animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.email-card { background:var(--white); border:1px solid var(--border); border-radius:20px; padding:48px; text-align:center; }
.email-icon { width:80px; height:80px; background:var(--gradient-primary); border-radius:20px; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; color:var(--white); }
.email-icon svg { width:40px; height:40px; }
.email-title { font-size:24px; font-weight:700; margin-bottom:12px; }
.email-desc { font-size:16px; color:var(--text-secondary); margin-bottom:32px; max-width:500px; margin-left:auto; margin-right:auto; }

<script>
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('hamburgerBtn');
  var menu = document.getElementById('navMenu');
  if(btn && menu){
    btn.addEventListener('click', function(){
      btn.classList.toggle('open');
      menu.classList.toggle('open');
    });
    menu.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click', function(){ btn.classList.remove('open'); menu.classList.remove('open'); });
    });
  }

  // Auto card view on mobile for datasets/standards
  if(window.innerWidth <= 768){
    if(typeof state !== 'undefined' && state && 'view' in state){ state.view = 'card';
      if(typeof update === 'function') update();
    }
  }
});
</script>
