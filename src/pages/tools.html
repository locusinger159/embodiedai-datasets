<!DOCTYPE html>
<html lang="zh-CN">
<head>{{HEAD}}
<style>
.tools-section { max-width:1400px; margin:0 auto; padding:40px 48px 60px; }
.tools-layout { display:flex; gap:24px; align-items:flex-start; }
.filter-sidebar { width:240px; flex-shrink:0; position:sticky; top:100px; max-height:calc(100vh - 120px); overflow-y:auto; }
.filter-sidebar h3 { font-size:14px; font-weight:600; margin-bottom:12px; color:var(--text-primary); }
.search-input-wrapper { position:relative; margin-bottom:16px; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-light); pointer-events:none; }
.search-input { width:100%; padding:10px 14px 10px 38px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:var(--white); color:var(--text-primary); outline:none; box-sizing:border-box; }
.search-input:focus { border-color:var(--primary); }
.filter-card { margin-bottom:16px; }
.filter-card-header { display:flex; align-items:center; gap:6px; margin-bottom:8px; font-size:13px; font-weight:600; color:var(--text-secondary); }
.filter-chips { display:flex; flex-wrap:wrap; gap:6px; }
.filter-chip { padding:4px 10px; border:1px solid var(--border); border-radius:16px; font-size:12px; background:var(--white); color:var(--text-secondary); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.filter-chip:hover { border-color:var(--primary); color:var(--primary); }
.filter-chip.active { background:var(--primary); color:var(--white); border-color:var(--primary); }
.chip-count { font-size:10px; opacity:0.7; margin-left:4px; }
.filter-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.clear-filters { font-size:12px; color:var(--text-light); cursor:pointer; border:none; background:none; padding:4px 8px; }
.clear-filters:hover { color:var(--primary); }
.filter-result-count { font-size:13px; color:var(--text-secondary); margin-bottom:12px; display:block; }
.tools-main { flex:1; min-width:0; }
.tools-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; }
.tool-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:24px; transition:all 0.2s; display:flex; flex-direction:column; gap:14px; height:100%; cursor:pointer; text-decoration:none; color:inherit; }
.tool-card:hover { border-color:var(--primary); box-shadow:0 4px 16px rgba(91,124,255,0.08); transform:translateY(-2px); }
.tool-card-top { display:flex; align-items:flex-start; gap:12px; }
.tool-card-icon { width:40px; height:40px; border-radius:8px; background:var(--light-bg); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.tool-card-icon svg { width:20px; height:20px; stroke:var(--text-secondary); }
.tool-card-header { flex:1; min-width:0; }
.tool-card-name { font-size:17px; font-weight:700; color:var(--text-primary); line-height:1.3; }
.tool-card-name:hover { color:var(--primary); }
.tool-card-meta { font-size:13px; color:var(--text-secondary); margin-top:3px; }
.tool-card-desc { font-size:13px; color:var(--text-secondary); line-height:1.6; flex:1; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.tool-card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:8px; border-top:1px solid var(--border); }
.tool-card-type { font-size:12px; }
.tool-card-arrow { font-size:13px; color:var(--text-light); transition:color 0.2s; white-space:nowrap; }
.tool-card:hover .tool-card-arrow { color:var(--primary); }
@media (max-width:1024px) { .tools-grid{grid-template-columns:1fr} }
@media (max-width:768px) { .tools-section{padding:100px 24px 40px} .tools-layout{flex-direction:column} .filter-sidebar{width:100%;position:static;max-height:none} }
</style>
</head>
<body>
{{NAVBAR}}
<section class="page-hero">
  <div class="page-hero-content">
    <h1 class="page-hero-title">{{TOOLS_PAGE_TITLE}}</h1>
    <p class="page-hero-subtitle">{{TOOLS_PAGE_SUBTITLE}}</p>
  </div>
</section>

<section class="tools-section">
  <div class="tools-layout">
    <aside class="filter-sidebar">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="搜索工具/平台名称、机构..." id="searchInput" oninput="handleSearch()">
      </div>
      <div class="filter-toolbar">
        <h3>筛选</h3>
        <button class="clear-filters" onclick="clearFilters()" id="clearFiltersBtn">清除</button>
      </div>
      <span class="filter-result-count" id="resultCount"></span>
      <div class="filter-card">
        <div class="filter-card-header"><span>🔧</span><span id="labelToolType">工具类型</span></div>
        <div class="filter-chips" id="toolTypeFilters"></div>
      </div>
      <div class="filter-card">
        <div class="filter-card-header"><span>🔓</span><span id="labelOpenness">开放程度</span></div>
        <div class="filter-chips" id="opennessFilters"></div>
      </div>
      <div class="filter-card">
        <div class="filter-card-header"><span>🏷️</span><span id="labelTags">热门标签</span></div>
        <div class="filter-chips" id="tagFilters"></div>
      </div>
    </aside>
    <div class="tools-main" id="toolsList"></div>
  </div>
</section>
{{FOOTER}}

<script>
var TOOLS = {{TOOLS_JSON}};
var I = window.I18N || {};
var tL = I.typeLabels || {open:'开源',partial:'部分开源',apply:'可申请',closed:'闭源'};
var ttL = I.toolTypeLabels || {};
var cL = {open:'type-open',partial:'type-partial',apply:'type-partial',closed:'type-closed'};

document.addEventListener('DOMContentLoaded',function(){
  var a=document.getElementById('labelToolType');if(a)a.textContent=I.toolType||a.textContent;
  var b=document.getElementById('labelOpenness');if(b)b.textContent=I.openness||b.textContent;
  var c=document.getElementById('searchInput');if(c)c.placeholder=I.searchPlaceholder||c.placeholder;
  var d=document.getElementById('clearFiltersBtn');if(d)d.textContent=I.clearFilters||d.textContent;
});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

var ICONS = {
  '仿真器':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
  '物理引擎':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>',
  '训练框架':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
  '可视化':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="8" y="14" width="7" height="7" rx="1"/></svg>',
  '触觉模拟':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
  'default':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>'
};

function getIcon(tool){var tt=tool.toolType||'';return ICONS[tt]||ICONS['default']}

function getSubtitle(tool){var parts=[];if(tool.institution)parts.push(tool.institution);parts.push(ttL[tool.toolType]||tool.toolType||'');return parts.join(' · ')}

var state = {search:'', toolType:[], type:[], tags:[]};

function buildFilters(){
  var tts=[...new Set(TOOLS.map(function(d){return d.toolType||'其他'}))].sort();
  var tps=[...new Set(TOOLS.map(function(d){return d.type}))];
  var tagCount={};TOOLS.forEach(function(d){(d.tags||[]).forEach(function(t){tagCount[t]=(tagCount[t]||0)+1})});
  var allTags=[...new Set(TOOLS.flatMap(function(d){return d.tags||[]}))].filter(function(t){return tagCount[t]>=1}).sort();
  function cnt(field,val){return TOOLS.filter(function(d){return d[field]===val}).length}
  document.getElementById('toolTypeFilters').innerHTML=tts.map(function(tt){var n=TOOLS.filter(function(d){return d.toolType===tt}).length;return '<button class="filter-chip'+(state.toolType.includes(tt)?' active':'')+'" data-f="toolType" data-v="'+tt+'">'+(ttL[tt]||tt)+'<span class="chip-count">'+n+'</span></button>'}).join('');
  document.getElementById('opennessFilters').innerHTML=tps.map(function(t){var n=TOOLS.filter(function(d){return d.type===t}).length;return '<button class="filter-chip'+(state.type.includes(t)?' active':'')+'" data-f="type" data-v="'+t+'">'+(tL[t]||t)+'<span class="chip-count">'+n+'</span></button>'}).join('');
  document.getElementById('tagFilters').innerHTML=allTags.map(function(t){var n=TOOLS.filter(function(d){return (d.tags||[]).indexOf(t)>-1}).length;return '<button class="filter-chip'+(state.tags.includes(t)?' active':'')+'" data-f="tags" data-v="'+t+'">'+t+(n?'<span class="chip-count">'+n+'</span>':'')+'</button>'}).join('');
  bindFilterChips();
}

function bindFilterChips(){
  document.querySelectorAll('.filter-chip').forEach(function(c){
    c.onclick=function(){var f=this.dataset.f,v=this.dataset.v;var arr=state[f];var i=arr.indexOf(v);if(i>-1)arr.splice(i,1);else arr.push(v);update()}
  });
}

function filterData(){
  var r=TOOLS;
  if(state.search){var q=state.search.toLowerCase();r=r.filter(function(d){return d.name.toLowerCase().indexOf(q)>-1||(d.institution||'').toLowerCase().indexOf(q)>-1||(d.notes||'').toLowerCase().indexOf(q)>-1})}
  if(state.toolType.length)r=r.filter(function(d){return state.toolType.indexOf(d.toolType||'其他')>-1});
  if(state.type.length)r=r.filter(function(d){return state.type.indexOf(d.type)>-1});
  if(state.tags.length)r=r.filter(function(d){return state.tags.some(function(v){return (d.tags||[]).indexOf(v)>-1})});
  return r;
}

function render(){
  var data = filterData();
  var h = data.map(function(tool){
    return '<a href="/tools/' + tool.id + '/" class="tool-card">'
      + '<div class="tool-card-top">'
      + '<div class="tool-card-icon">' + getIcon(tool) + '</div>'
      + '<div class="tool-card-header">'
      + '<div class="tool-card-name">' + tool.name + '</div>'
      + '<div class="tool-card-meta">' + getSubtitle(tool) + '</div>'
      + '</div></div>'
      + '<div class="tool-card-desc">' + esc(tool.notes || '') + '</div>'
      + '<div class="tool-card-footer">'
      + '<span class="type-badge ' + (cL[tool.type]||'') + ' tool-card-type">' + (tL[tool.type]||tool.type) + '</span>'
      + '<span class="tool-card-arrow">详情 →</span>'
      + '</div></a>';
  }).join('');
  document.getElementById('toolsList').innerHTML = '<div class="tools-grid">' + h + '</div>';
  document.getElementById('resultCount').textContent = (I.resultCount||'找到') + ' ' + data.length + ' ' + (data.length===1?'工具':'个工具');
}

function handleSearch(){state.search=document.getElementById('searchInput').value;update()}
function clearFilters(){state.search='';state.toolType=[];state.type=[];state.tags=[];document.getElementById('searchInput').value='';update()}

function update(){buildFilters();render()}

window.addEventListener('scroll',function(){var n=document.querySelector('.navbar'),y=window.scrollY;n.style.background=y>50?'rgba(11,15,26,0.95)':'rgba(11,15,26,0.85)';n.style.boxShadow=y>50?'0 4px 20px rgba(0,0,0,0.3)':'none'});

update();
</script>
</body>
</html>
