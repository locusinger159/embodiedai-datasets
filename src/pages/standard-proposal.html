<!DOCTYPE html>
<html lang="zh-CN">
<head>{{HEAD}}
<style>
.proposal-section { max-width:800px; margin:0 auto; }
.proposal-section h2 { font-size:22px; font-weight:700; margin:40px 0 16px; padding-left:12px; border-left:4px solid var(--primary); }
.proposal-section h3 { font-size:18px; font-weight:600; margin:24px 0 12px; }
.proposal-section p { font-size:15px; line-height:1.8; color:var(--text-secondary); margin-bottom:16px; }
.proposal-section ul { margin-bottom:20px; padding-left:24px; }
.proposal-section li { font-size:15px; line-height:1.8; color:var(--text-secondary); margin-bottom:6px; }
.schema-box { background:var(--dark-bg); border-radius:16px; padding:32px; margin:24px 0; }
.schema-code { font-family:'SF Mono','Fira Code','Inter',monospace; font-size:14px; color:var(--accent); white-space:pre; line-height:1.8; }
.comparison-table { width:100%; border-collapse:collapse; margin:24px 0; background:var(--white); border-radius:12px; overflow:hidden; border:1px solid var(--border); }
.comparison-table th, .comparison-table td { padding:12px 16px; text-align:left; font-size:14px; border-bottom:1px solid var(--border); }
.comparison-table th { background:var(--light-bg); font-weight:600; color:var(--text-secondary); font-size:13px; }
.disclaimer-box { background:rgba(245,158,11,0.05); border:1px solid rgba(245,158,11,0.2); border-radius:12px; padding:20px 24px; margin:32px 0; }
.disclaimer-box p { font-size:14px; color:var(--warning); margin:0; }
</style>
</head>
<body>
{{NAVBAR}}
<section class="page-hero">
  <div class="page-hero-content centered">
    <h1 class="page-hero-title">{{PROPOSAL_TITLE}}</h1>
    <p class="page-hero-subtitle">{{PROPOSAL_SUBTITLE}}</p>
  </div>
</section>
<section class="section">
  <div class="proposal-section">
    {{PROPOSAL_CONTENT}}
  </div>
</section>
{{FOOTER}}
<script>
window.addEventListener('scroll',function(){var n=document.querySelector('.navbar'),y=window.scrollY;n.style.background=y>50?'rgba(11,15,26,0.95)':'rgba(11,15,26,0.85)';n.style.boxShadow=y>50?'0 4px 20px rgba(0,0,0,0.3)':'none'})
</script>
</body>
</html>
