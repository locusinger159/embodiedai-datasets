<!DOCTYPE html>
<html lang="zh-CN">
<head>{{HEAD}}
<style>
.rec-main { max-width:1000px; margin:0 auto; padding:120px 48px 60px; }
.rec-hero { margin-bottom:40px; }
.rec-hero h1 { font-size:32px; font-weight:800; margin-bottom:8px; }
.rec-hero p { font-size:16px; color:var(--text-secondary); max-width:600px; }

.rec-wizard { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:32px; margin-bottom:40px; }
.rec-step { margin-bottom:24px; }
.rec-step:last-child { margin-bottom:0; }
.rec-step-label { font-size:14px; font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.rec-step-num { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:var(--primary); color:var(--white); font-size:12px; font-weight:700; }
.rec-chips { display:flex; flex-wrap:wrap; gap:8px; }
.rec-chip { padding:8px 18px; border-radius:20px; border:1.5px solid var(--border); background:var(--white); font-size:14px; cursor:pointer; transition:all 0.2s; color:var(--text-primary); font-family:inherit; }
.rec-chip:hover { border-color:var(--primary); color:var(--primary); }
.rec-chip.active { background:var(--primary); color:var(--white); border-color:var(--primary); }
.rec-radio-group { display:flex; flex-wrap:wrap; gap:8px; }
.rec-radio { padding:8px 18px; border-radius:20px; border:1.5px solid var(--border); background:var(--white); font-size:14px; cursor:pointer; transition:all 0.2s; color:var(--text-primary); font-family:inherit; }
.rec-radio:hover { border-color:var(--primary); color:var(--primary); }
.rec-radio.active { background:rgba(91,124,255,0.1); color:var(--primary); border-color:var(--primary); font-weight:600; }

.rec-actions { display:flex; gap:12px; margin-top:28px; padding-top:24px; border-top:1px solid var(--border); }
.rec-btn { padding:12px 32px; border-radius:10px; font-weight:700; font-size:15px; cursor:pointer; transition:all 0.2s; border:none; font-family:inherit; }
.rec-btn-primary { background:var(--primary); color:var(--white); }
.rec-btn-primary:hover { opacity:0.9; transform:translateY(-1px); box-shadow:0 4px 16px rgba(91,124,255,0.3); }
.rec-btn-secondary { background:var(--light-bg); color:var(--text-secondary); }
.rec-btn-secondary:hover { background:var(--border); }

.rec-results { margin-bottom:60px; }
.rec-results-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.rec-results-header h2 { font-size:22px; font-weight:700; }
.rec-count { font-size:14px; color:var(--text-secondary); }
.rec-result-card { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:16px; transition:all 0.2s; }
.rec-result-card:hover { border-color:var(--primary); box-shadow:0 4px 20px rgba(91,124,255,0.06); }
.rec-result-top { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:12px; }
.rec-result-name { font-size:20px; font-weight:700; color:var(--text-primary); }
.rec-result-org { font-size:14px; color:var(--text-secondary); margin-top:2px; }
.rec-score { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:10px; font-weight:700; font-size:15px; flex-shrink:0; }
.rec-score-high { background:rgba(16,185,129,0.1); color:var(--success); }
.rec-score-mid { background:rgba(245,158,11,0.1); color:var(--warning); }
.rec-score-low { background:rgba(107,114,128,0.1); color:var(--text-light); }
.rec-reasons { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.rec-reason { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:14px; font-size:12px; font-weight:500; }
.rec-reason.good { background:rgba(16,185,129,0.08); color:var(--success); }
.rec-reason.info { background:rgba(91,124,255,0.08); color:var(--primary); }
.rec-reason.warn { background:rgba(245,158,11,0.08); color:var(--warning); }
.rec-result-desc { font-size:14px; color:var(--text-secondary); line-height:1.6; margin-bottom:12px; }
.rec-result-footer { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.rec-result-footer .data-tag { font-size:11px; }
.rec-result-link { display:inline-flex; align-items:center; gap:4px; padding:8px 16px; background:var(--primary); color:var(--white); border-radius:8px; font-size:13px; font-weight:600; text-decoration:none; transition:all 0.2s; }
.rec-result-link:hover { opacity:0.9; }
.rec-empty { text-align:center; padding:60px 20px; color:var(--text-light); }
.rec-empty-icon { font-size:48px; margin-bottom:16px; }
.rec-empty h3 { font-size:18px; font-weight:600; margin-bottom:8px; color:var(--text-secondary); }
.rec-empty p { font-size:14px; }

.rec-presets { margin-bottom:16px; }
.rec-presets-label { font-size:12px; font-weight:600; color:var(--text-light); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.rec-presets-chips { display:flex; flex-wrap:wrap; gap:6px; }
.rec-preset { padding:6px 14px; border-radius:16px; background:var(--light-bg); border:1px solid var(--border); font-size:13px; cursor:pointer; transition:all 0.2s; color:var(--text-secondary); font-family:inherit; white-space:nowrap; }
.rec-preset:hover { border-color:var(--primary); color:var(--primary); background:rgba(91,124,255,0.04); }
.rec-preset.active { background:rgba(91,124,255,0.08); color:var(--primary); border-color:var(--primary); }

@media (max-width:768px) {
  .rec-main { padding:100px 20px 40px; }
  .rec-hero h1 { font-size:24px; }
  .rec-wizard { padding:20px; }
  .rec-result-top { flex-direction:column; }
  .rec-score { align-self:flex-start; }
}
</style>
</head>
<body>
{{NAVBAR}}
<main class="rec-main">
  <div class="rec-hero">
    <h1>🎯 {{REC_TITLE}}</h1>
    <p>{{REC_SUBTITLE}}</p>
  </div>

  <!-- Wizard -->
  <div class="rec-wizard">
    <!-- Presets -->
    <div class="rec-presets">
      <div class="rec-presets-label">{{REC_PRESETS_LABEL}}</div>
      <div class="rec-presets-chips" id="presets"></div>
    </div>

    <!-- Step 1: Task -->
    <div class="rec-step">
      <div class="rec-step-label"><span class="rec-step-num">1</span> {{REC_STEP_TASK}}</div>
      <div class="rec-chips" id="taskChips"></div>
    </div>

    <!-- Step 2: Robot -->
    <div class="rec-step">
      <div class="rec-step-label"><span class="rec-step-num">2</span> {{REC_STEP_ROBOT}}</div>
      <div class="rec-chips" id="robotChips"></div>
    </div>

    <!-- Step 3: Modality -->
    <div class="rec-step">
      <div class="rec-step-label"><span class="rec-step-num">3</span> {{REC_STEP_MODALITY}}</div>
      <div class="rec-chips" id="modalityChips"></div>
    </div>

    <!-- Step 4: Scene -->
    <div class="rec-step">
      <div class="rec-step-label"><span class="rec-step-num">4</span> {{REC_STEP_SCENE}}</div>
      <div class="rec-radio-group" id="sceneRadios"></div>
    </div>

    <!-- Step 5: VLA -->
    <div class="rec-step">
      <div class="rec-step-label"><span class="rec-step-num">5</span> {{REC_STEP_VLA}}</div>
      <div class="rec-chips" id="vlaChips"></div>
    </div>

    <!-- Step 6: Access -->
    <div class="rec-step">
      <div class="rec-step-label"><span class="rec-step-num">6</span> {{REC_STEP_ACCESS}}</div>
      <div class="rec-radio-group" id="accessRadios"></div>
    </div>

    <div class="rec-actions">
      <button class="rec-btn rec-btn-primary" onclick="recommend()">{{REC_BTN_RECOMMEND}}</button>
      <button class="rec-btn rec-btn-secondary" onclick="resetAll()">{{REC_BTN_RESET}}</button>
    </div>
  </div>

  <!-- Results -->
  <div class="rec-results" id="results">
    <div class="rec-results-header">
      <h2>{{REC_RESULTS_TITLE}}</h2>
      <span class="rec-count" id="resultCount"></span>
    </div>
    <div id="resultList"></div>
  </div>
</main>
{{FOOTER}}

<script>
{{I18N_JS}}
const DS = {{DATASETS_JSON}};
var I=window.I18N||{};
var tL=I.typeLabels||{open:'开源',partial:'部分开源',apply:'可申请',closed:'闭源'};
var rL=I.robotLabels||{};
var tkL=I.taskLabels||{};
var vlaS=I.vlaShortLabels||{};
var vlaF=I.vlaLabels||{};
var selected={tasks:[],robots:[],modalities:[],scene:null,vla:null,access:null};

// Presets
var presets=[
  {id:'pick-place-arm',labelByLang:'{{REC_PRESET_PICK_PLACE}}',tasks:['操作','抓取'],robots:['arm'],modalities:['视觉','本体状态']},
  {id:'nav-mobile',labelByLang:'{{REC_PRESET_NAV}}',tasks:['导航'],robots:['mobile'],modalities:['视觉']},
  {id:'humanoid-loco',labelByLang:'{{REC_PRESET_LOCO}}',tasks:['运动控制'],robots:['humanoid'],modalities:['视觉','本体状态','动作']},
  {id:'bimanip-aloha',labelByLang:'{{REC_PRESET_BIMANIP}}',tasks:['操作'],robots:['arm','multi'],modalities:['视觉','本体状态','动作'],vla:'act'},
  {id:'openvla-bench',labelByLang:'{{REC_PRESET_OPENVLA}}',tasks:['操作'],robots:['arm'],vla:'openvla'},
  {id:'healthcare',labelByLang:'{{REC_PRESET_HEALTHCARE}}',tasks:['康养护理'],robots:[],modalities:['视觉']},
];

function init(){
  // Task chips
  var tasks=[...new Set(DS.flatMap(function(d){return d.task||[]}))].sort();
  document.getElementById('taskChips').innerHTML=tasks.map(function(t){
    return '<button class="rec-chip'+(selected.tasks.includes(t)?' active':'')+'" onclick="toggleChip(\'tasks\',\''+t.replace(/'/g,"\\'")+'\')">'+escHtml(tkL[t]||t)+'</button>';
  }).join('');

  // Robot chips
  var robots=[...new Set(DS.flatMap(function(d){return d.robotType||[]}))].sort();
  document.getElementById('robotChips').innerHTML=robots.map(function(r){
    return '<button class="rec-chip'+(selected.robots.includes(r)?' active':'')+'" onclick="toggleChip(\'robots\',\''+r.replace(/'/g,"\\'")+'\')">'+escHtml(rL[r]||r)+'</button>';
  }).join('');

  // Modality chips
  var mods=[...new Set(DS.flatMap(function(d){return d.modality||[]}))].sort();
  document.getElementById('modalityChips').innerHTML=mods.map(function(m){
    return '<button class="rec-chip'+(selected.modalities.includes(m)?' active':'')+'" onclick="toggleChip(\'modalities\',\''+m.replace(/'/g,"\\'")+'\')">'+escHtml(m)+'</button>';
  }).join('');

  // Scene radios
  var scenes=[{v:null,l:'{{REC_SCENE_ANY}}'},{v:'真机',l:'{{REC_SCENE_REAL}}'},{v:'仿真',l:'{{REC_SCENE_SIM}}'}];
  document.getElementById('sceneRadios').innerHTML=scenes.map(function(s){
    return '<button class="rec-radio'+(selected.scene===s.v?' active':'')+'" onclick="setRadio(\'scene\',\''+(s.v||'')+'\')">'+s.l+'</button>';
  }).join('');

  // VLA chips (single select via click)
  var vlas=Object.keys(vlaS);
  document.getElementById('vlaChips').innerHTML=vlas.map(function(v){
    return '<button class="rec-chip'+(selected.vla===v?' active':'')+'" onclick="setVla(\''+v+'\')" title="'+(vlaF[v]||'')+'">'+escHtml(vlaS[v]||v)+'</button>';
  }).join('')+'<button class="rec-chip'+(selected.vla===null?' active':'')+'" onclick="setVla(null)">{{REC_ANY}}</button>';

  // Access radios
  var accesses=[{v:null,l:'{{REC_ACCESS_ANY}}'},{v:'open',l:'{{REC_ACCESS_OPEN}}'},{v:'open,partial',l:'{{REC_ACCESS_OPEN_APPLY}}'}];
  document.getElementById('accessRadios').innerHTML=accesses.map(function(a){
    return '<button class="rec-radio'+(selected.access===a.v?' active':'')+'" onclick="setRadio(\'access\',\''+(a.v||'')+'\')">'+a.l+'</button>';
  }).join('');

  // Presets
  document.getElementById('presets').innerHTML=presets.map(function(p){
    return '<button class="rec-preset" onclick="applyPreset(\''+p.id+'\')">'+p.labelByLang+'</button>';
  }).join('');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function toggleChip(arrName,val){
  var arr=selected[arrName];
  var i=arr.indexOf(val);
  if(i>-1) arr.splice(i,1); else arr.push(val);
  refreshUI();
}

function setRadio(field,val){
  selected[field]=val||null;
  refreshUI();
}

function setVla(val){
  selected.vla=val;
  refreshUI();
}

function applyPreset(id){
  var p=presets.find(function(x){return x.id===id});
  if(!p) return;
  selected.tasks=p.tasks.slice();
  selected.robots=p.robots.slice();
  selected.modalities=p.modalities||[];
  selected.scene=p.scene||null;
  selected.vla=p.vla||null;
  selected.access=p.access||null;
  refreshUI();
  recommend();
}

function resetAll(){
  selected={tasks:[],robots:[],modalities:[],scene:null,vla:null,access:null};
  refreshUI();
  document.getElementById('resultList').innerHTML='<div class="rec-empty"><div class="rec-empty-icon">🔍</div><h3>{{REC_EMPTY_TITLE}}</h3><p>{{REC_EMPTY_HINT}}</p></div>';
  document.getElementById('resultCount').textContent='';
}

function refreshUI(){init()}

function recommend(){
  var results=DS.map(function(d){
    // Calculate score
    var taskM=selected.tasks.length?(selected.tasks.filter(function(t){return (d.task||[]).includes(t)}).length/selected.tasks.length)*4:0;
    var robotM=selected.robots.length?(selected.robots.filter(function(r){return (d.robotType||[]).includes(r)}).length/selected.robots.length)*3:0;
    var modM=selected.modalities.length?(selected.modalities.filter(function(m){return (d.modality||[]).includes(m)}).length/selected.modalities.length)*2:0;
    var sceneM=0;
    if(selected.scene){
      if(selected.scene==='真机'&&d.quality&&d.quality.realWorld==='100%真机') sceneM=2;
      else if(selected.scene==='仿真'&&d.quality&&d.quality.realWorld==='仿真') sceneM=2;
    }
    var vlaM=0;
    if(selected.vla){
      if((d.vlaCompatible||[]).includes(selected.vla)) vlaM=5;
    }
    var accessM=0;
    if(selected.access){
      var allowed=selected.access.split(',');
      if(allowed.includes(d.type)) accessM=1;
    }
    // Quality bonus
    var qBonus=0;
    if(d.quality){
      if(d.quality.hasSplit) qBonus+=0.5;
      if(d.quality.realWorld==='100%真机') qBonus+=0.5;
    }

    var total=taskM+robotM+modM+sceneM+vlaM+accessM+qBonus;
    var maxPossible=4+3+2+2+5+1+1;
    var score=Math.round((total/maxPossible)*100);

    // Build reasons
    var reasons=[];
    if(taskM>0) reasons.push({text:'{{REC_REASON_TASK}}'+(d.task||[]).filter(function(t){return selected.tasks.includes(t)}).map(function(t){return tkL[t]||t}).join('、'),cls:'good'});
    if(robotM>0) reasons.push({text:'{{REC_REASON_ROBOT}}'+(d.robotType||[]).filter(function(r){return selected.robots.includes(r)}).map(function(r){return rL[r]||r}).join('、'),cls:'good'});
    if(modM>0) reasons.push({text:'{{REC_REASON_MOD}}'+(d.modality||[]).filter(function(m){return selected.modalities.includes(m)}).join('、'),cls:'info'});
    if(vlaM>0) reasons.push({text:'{{REC_REASON_VLA}}'+escHtml(vlaS[selected.vla]||selected.vla),cls:'good'});
    if(accessM>0) reasons.push({text:'{{REC_REASON_ACCESS}}',cls:'info'});
    if(sceneM>0) reasons.push({text:selected.scene==='真机'?'{{REC_REASON_REAL}}':'{{REC_REASON_SIM}}',cls:'good'});

    return {d:d,score:score,reasons:reasons};
  });

  // Filter by minimum score, or if no selections at all, sort by quality
  var hasSelection=selected.tasks.length||selected.robots.length||selected.modalities.length||selected.scene||selected.vla||selected.access;
  if(hasSelection){
    results=results.filter(function(r){return r.score>=20});
  }
  results.sort(function(a,b){return b.score-a.score});
  results=results.slice(0,8);

  document.getElementById('resultCount').textContent=(hasSelection?'{{REC_FOUND}} ':'{{REC_TOP}} ')+results.length+' {{REC_DATASETS}}';

  if(!results.length){
    document.getElementById('resultList').innerHTML='<div class="rec-empty"><div class="rec-empty-icon">🤔</div><h3>{{REC_NO_RESULTS_TITLE}}</h3><p>{{REC_NO_RESULTS_HINT}}</p></div>';
    return;
  }

  document.getElementById('resultList').innerHTML=results.map(function(r,i){
    var cls=r.score>=70?'rec-score-high':r.score>=40?'rec-score-mid':'rec-score-low';
    return '<div class="rec-result-card">'
      +'<div class="rec-result-top">'
      +'<div><div class="rec-result-name">'+(i+1)+'. '+escHtml(r.d.name)+'</div>'
      +'<div class="rec-result-org">'+escHtml(r.d.institution||'')+' · '+escHtml(r.d.scale||'')+' · '+(r.d.year||'—')+'</div></div>'
      +'<div class="rec-score '+cls+'">🏆 '+r.score+' {{REC_SCORE_UNIT}}</div>'
      +'</div>'
      +(r.reasons.length?'<div class="rec-reasons">'+r.reasons.map(function(w){return '<span class="rec-reason '+w.cls+'">'+(w.cls==='good'?'✅':w.cls==='warn'?'⚠️':'ℹ️')+' '+w.text+'</span>'}).join('')+'</div>':'')
      +(r.d.notes?'<div class="rec-result-desc">'+escHtml(r.d.notes)+'</div>':'')
      +'<div class="rec-result-footer">'
      +'<span class="type-badge '+(r.d.type==='open'?'type-open':'type-partial')+'">'+escHtml(tL[r.d.type]||r.d.type)+'</span>'
      +(r.d.robotType||[]).slice(0,3).map(function(rt){return '<span class="data-tag">'+escHtml(rL[rt]||rt)+'</span>'}).join('')
      +(r.d.task||[]).slice(0,2).map(function(t){return '<span class="data-tag">'+escHtml(tkL[t]||t)+'</span>'}).join('')
      +'<a href="/datasets/'+r.d.id+'/" class="rec-result-link">{{REC_VIEW_DETAIL}} →</a>'
      +'</div></div>';
  }).join('');
}

document.addEventListener('DOMContentLoaded',function(){
  init();
  // Auto-recommend on load (no filters = top quality)
  recommend();
});
</script>
</body>
</html>
