<!DOCTYPE html>
<html lang="zh-CN">
<head>{{HEAD}}
<style>
.formats-section { max-width:1200px; margin:0 auto; }
.format-stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:40px; }
.format-stat-card { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:24px; text-align:center; }
.format-stat-number { font-size:36px; font-weight:800; color:var(--primary); font-family:'Inter',monospace; }
.format-stat-label { font-size:13px; color:var(--text-secondary); margin-top:8px; }
.bar-chart { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:32px; margin-bottom:24px; }
.bar-chart h3 { margin-bottom:20px; font-size:18px; font-weight:600; }
.bar-row { display:flex; align-items:center; margin-bottom:12px; }
.bar-label { width:140px; font-size:14px; font-weight:500; text-align:right; padding-right:16px; flex-shrink:0; }
.bar-track { flex:1; height:24px; background:var(--light-bg); border-radius:12px; overflow:hidden; }
.bar-fill { height:100%; background:var(--gradient-primary); border-radius:12px; transition:width 0.6s ease; }
.bar-count { width:60px; text-align:right; font-size:13px; color:var(--text-secondary); padding-left:12px; flex-shrink:0; }
@media (max-width:768px) { .format-stat-grid{grid-template-columns:repeat(2,1fr)} .bar-label{width:80px;font-size:12px} }
</style>
</head>
<body>
{{NAVBAR}}
<section class="page-hero">
  <div class="page-hero-content centered">
    <h1 class="page-hero-title">{{FORMATS_PAGE_TITLE}}</h1>
    <p class="page-hero-subtitle">{{FORMATS_PAGE_SUBTITLE}}</p>
  </div>
</section>
<section class="section">
  <div class="formats-section">
    <div class="format-stat-grid" id="statGrid"></div>
    <div class="bar-chart"><h3>{{FORMATS_STORAGE_TITLE}}</h3><div id="storageChart"></div></div>
    <div class="bar-chart"><h3>{{FORMATS_SCHEMA_TITLE}}</h3><div id="schemaChart"></div></div>
    <div class="bar-chart"><h3>{{FORMATS_SENSOR_TITLE}}</h3><div id="sensorChart"></div></div>
  </div>
</section>
{{FOOTER}}
<script>
var FD = {{FORMATS_JSON}};
(function(){
  var sc=FD.storageCounts||{};
  var max=Math.max.apply(null,Object.values(sc).concat([1]));
  document.getElementById('storageChart').innerHTML=Object.entries(sc).map(function(e){
    var pct=Math.round(e[1]/max*100);
    return '<div class="bar-row"><span class="bar-label">'+e[0]+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div><span class="bar-count">'+e[1]+'</span></div>';
  }).join('');
})();
(function(){
  var sd=FD.schemaDepths||{};
  var max=Math.max.apply(null,Object.values(sd).concat([1]));
  document.getElementById('schemaChart').innerHTML=Object.entries(sd).sort(function(a,b){return parseInt(a[0])-parseInt(b[0])}).map(function(e){
    var pct=Math.round(e[1]/max*100);
    return '<div class="bar-row"><span class="bar-label">'+e[0]+' layers</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div><span class="bar-count">'+e[1]+' datasets</span></div>';
  }).join('');
})();
(function(){
  var sc=FD.sensorCounts||{};
  var entries=Object.entries(sc).sort(function(a,b){return b[1]-a[1]}).slice(0,15);
  var max=Math.max.apply(null,entries.map(function(e){return e[1]}).concat([1]));
  document.getElementById('sensorChart').innerHTML=entries.map(function(e){
    var pct=Math.round(e[1]/max*100);
    return '<div class="bar-row"><span class="bar-label">'+e[0]+'</span><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div><span class="bar-count">'+e[1]+'</span></div>';
  }).join('');
})();
(function(){
  var g=document.getElementById('statGrid');
  var total=FD.totalDatasets||0;
  g.innerHTML='<div class="format-stat-card"><div class="format-stat-number">'+total+'</div><div class="format-stat-label">{{STAT_TOTAL_DATASETS}}</div></div>'+
    '<div class="format-stat-card"><div class="format-stat-number">'+Object.keys(FD.storageCounts||{}).length+'</div><div class="format-stat-label">{{STAT_STORAGE_FORMATS}}</div></div>'+
    '<div class="format-stat-card"><div class="format-stat-number">'+Object.keys(FD.sensorCounts||{}).length+'</div><div class="format-stat-label">{{STAT_SENSOR_TYPES}}</div></div>'+
    '<div class="format-stat-card"><div class="format-stat-number">'+(FD.standardFormatRatio||'0')+'%</div><div class="format-stat-label">{{STAT_STANDARD_RATIO}}</div></div>';
})();
</script>
</body>
</html>
