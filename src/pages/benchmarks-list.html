<!DOCTYPE html>
<html lang="zh-CN">
<head>{{HEAD}}
<style>
.bm-section { max-width:1400px; margin:0 auto; padding:40px 48px 60px; }
.bm-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.bm-count { font-size:14px; color:var(--text-secondary); }
.bm-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; }
.bm-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:24px; transition:all 0.2s; display:flex; flex-direction:column; gap:14px; height:100%; cursor:pointer; text-decoration:none; color:inherit; }
.bm-card:hover { border-color:var(--primary); box-shadow:0 4px 16px rgba(91,124,255,0.08); transform:translateY(-2px); }
.bm-card-top { display:flex; align-items:flex-start; gap:12px; }
.bm-card-icon { width:40px; height:40px; border-radius:8px; background:rgba(91,124,255,0.08); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }
.bm-card-header { flex:1; min-width:0; }
.bm-card-name { font-size:17px; font-weight:700; color:var(--text-primary); line-height:1.3; }
.bm-card-name:hover { color:var(--primary); }
.bm-card-meta { font-size:13px; color:var(--text-secondary); margin-top:3px; }
.bm-card-desc { font-size:13px; color:var(--text-secondary); line-height:1.6; flex:1; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.bm-card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:8px; border-top:1px solid var(--border); }
.bm-card-badge { padding:3px 10px; border-radius:16px; font-size:12px; font-weight:500; background:rgba(91,124,255,0.08); color:var(--primary); }
.bm-card-count { font-size:12px; color:var(--text-light); }
@media (max-width:1024px) { .bm-grid{grid-template-columns:1fr} }
@media (max-width:768px) { .bm-section{padding:100px 20px 40px} }
</style>
</head>
<body>
{{NAVBAR}}
<section class="page-hero">
  <div class="page-hero-content">
    <h1 class="page-hero-title">{{BM_TITLE}}</h1>
    <p class="page-hero-subtitle">{{BM_SUBTITLE}}</p>
  </div>
</section>

<div class="bm-section">
  <div class="bm-toolbar">
    <span class="bm-count">{{BM_RESULT_COUNT}}</span>
  </div>
  <div class="bm-grid">
    {{BM_CARDS}}
  </div>
</div>
{{FOOTER}}
</body>
</html>
