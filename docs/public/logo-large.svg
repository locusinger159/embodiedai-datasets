<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Main 3D gradient - deep blue to purple -->
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="faceLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="60%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <!-- Shadows -->
    <filter id="drop3d">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2e1065" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1e1b4b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background subtle glow -->
  <circle cx="100" cy="100" r="95" fill="#f5f3ff" opacity="0.5"/>
  <circle cx="100" cy="95" r="75" fill="url(#accent)" opacity="0.08"/>

  <!-- === 3D ISOMETRIC CUBE HEAD === -->

  <!-- Top face -->
  <polygon points="100,18 160,52 100,86 40,52" fill="url(#faceTop)" filter="url(#drop3d)"/>
  <!-- Top face inner highlight -->
  <polygon points="100,22 154,52 100,80 46,52" fill="white" opacity="0.12"/>

  <!-- Left face (3D side) -->
  <polygon points="40,52 100,86 100,158 40,124" fill="url(#faceLeft)" filter="url(#drop3d)"/>
  <!-- Left face highlight -->
  <polygon points="44,56 96,86 96,152 44,122" fill="white" opacity="0.05"/>

  <!-- Right face (front-ish) -->
  <polygon points="100,86 160,52 160,124 100,158" fill="url(#faceRight)" filter="url(#drop3d)"/>
  <!-- Right face highlight -->
  <polygon points="104,88 154,56 154,118 104,152" fill="white" opacity="0.08"/>

  <!-- === ROBOT EYES on right face === -->

  <!-- Left eye -->
  <ellipse cx="115" cy="82" rx="10" ry="13" fill="#0f172a" filter="url(#softShadow)"/>
  <ellipse cx="115" cy="80" rx="7" ry="9" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <circle cx="113" cy="78" r="2.5" fill="white" opacity="0.9"/>

  <!-- Right eye -->
  <ellipse cx="143" cy="82" rx="10" ry="13" fill="#0f172a" filter="url(#softShadow)"/>
  <ellipse cx="143" cy="80" rx="7" ry="9" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <circle cx="141" cy="78" r="2.5" fill="white" opacity="0.9"/>

  <!-- Eyebrow accent lines -->
  <line x1="107" y1="71" x2="123" y2="71" stroke="#67e8f9" stroke-width="1.5" opacity="0.5"/>
  <line x1="135" y1="71" x2="151" y2="71" stroke="#67e8f9" stroke-width="1.5" opacity="0.5"/>

  <!-- === DATA NODES floating === -->

  <!-- Node 1 - top left -->
  <circle cx="62" cy="65" r="4" fill="#67e8f9" opacity="0.7" filter="url(#glow)"/>
  <circle cx="62" cy="65" r="1.5" fill="white" opacity="0.9"/>

  <!-- Node 2 - top right -->
  <circle cx="148" cy="38" r="3.5" fill="#a78bfa" opacity="0.7" filter="url(#glow)"/>
  <circle cx="148" cy="38" r="1.2" fill="white" opacity="0.9"/>

  <!-- Node 3 - bottom left -->
  <circle cx="55" cy="115" r="3" fill="#c084fc" opacity="0.6" filter="url(#glow)"/>
  <circle cx="55" cy="115" r="1" fill="white" opacity="0.8"/>

  <!-- Node 4 - bottom right -->
  <circle cx="172" cy="100" r="3.5" fill="#67e8f9" opacity="0.6" filter="url(#glow)"/>
  <circle cx="172" cy="100" r="1.2" fill="white" opacity="0.8"/>

  <!-- Connection lines between nodes -->
  <line x1="62" y1="65" x2="148" y2="38" stroke="#a78bfa" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,3"/>
  <line x1="62" y1="65" x2="55" y2="115" stroke="#a78bfa" stroke-width="0.5" opacity="0.15" stroke-dasharray="2,3"/>
  <line x1="148" y1="38" x2="172" y2="100" stroke="#67e8f9" stroke-width="0.5" opacity="0.15" stroke-dasharray="2,3"/>

  <!-- === FRONT PLATE DETAIL on right face === -->

  <!-- Mouth / data indicator LEDs -->
  <rect x="118" y="108" width="6" height="2.5" rx="1.2" fill="#67e8f9" opacity="0.5"/>
  <rect x="126" y="108" width="6" height="2.5" rx="1.2" fill="#67e8f9" opacity="0.6"/>
  <rect x="134" y="108" width="6" height="2.5" rx="1.2" fill="#67e8f9" opacity="0.7"/>
  <rect x="142" y="108" width="6" height="2.5" rx="1.2" fill="#67e8f9" opacity="0.5"/>

  <!-- Small decorative chip on face -->
  <rect x="120" y="120" width="14" height="10" rx="2" fill="#1e1b4b" opacity="0.3"/>
  <line x1="123" y1="123" x2="131" y2="123" stroke="#67e8f9" stroke-width="0.8" opacity="0.4"/>
  <line x1="123" y1="126" x2="129" y2="126" stroke="#67e8f9" stroke-width="0.8" opacity="0.3"/>

  <!-- === BACK/SIDE DECORATIVE === -->

  <!-- Circuit trace on left face -->
  <path d="M52,80 L60,80 L64,76 L72,76 L76,80 L80,80" stroke="white" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- === TOP ANTENNA === -->
  <line x1="100" y1="18" x2="100" y2="6" stroke="url(#accent)" stroke-width="3" filter="url(#softShadow)"/>
  <circle cx="100" cy="4" r="5" fill="#67e8f9" filter="url(#glow)"/>
  <circle cx="99" cy="3" r="2" fill="white" opacity="0.8"/>

  <!-- === 3D BASE PLATFORM === -->
  <ellipse cx="100" cy="165" rx="40" ry="8" fill="#4c1d95" opacity="0.15" filter="url(#drop3d)"/>
  <ellipse cx="100" cy="162" rx="32" ry="6" fill="#6d28d9" opacity="0.1"/>

  <!-- "E" "D" letters on front face -->
  <text x="118" y="142" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="800" fill="white" opacity="0.6" letter-spacing="3">ED</text>
</svg>
