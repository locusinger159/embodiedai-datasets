<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Robot head -->
  <circle cx="50" cy="50" r="30" fill="url(#grad)"/>
  <!-- Eyes -->
  <circle cx="40" cy="46" r="5" fill="white"/>
  <circle cx="60" cy="46" r="5" fill="white"/>
  <!-- Antenna -->
  <line x1="50" y1="20" x2="50" y2="30" stroke="url(#grad)" stroke-width="4"/>
  <circle cx="50" cy="16" r="5" fill="#667eea"/>
  <!-- Body -->
  <rect x="30" y="80" width="40" height="15" rx="3" fill="url(#grad)"/>
  <!-- Database icon -->
  <ellipse cx="50" cy="90" rx="12" ry="5" fill="white" opacity="0.5"/>
  <!-- Text -->
  <text x="90" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#333">
    EmbodiedAI
  </text>
  <text x="90" y="70" font-family="system-ui, sans-serif" font-size="16" fill="#666">
    Datasets
  </text>
</svg>
