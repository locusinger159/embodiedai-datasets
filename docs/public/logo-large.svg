<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad2)" opacity="0.3"/>
  
  <!-- Robot head with 3D effect -->
  <ellipse cx="100" cy="70" rx="45" ry="42" fill="url(#grad1)" filter="url(#shadow)"/>
  <ellipse cx="98" cy="68" rx="40" ry="37" fill="url(#grad1)" opacity="0.5"/>
  
  <!-- Eyes -->
  <ellipse cx="85" cy="65" rx="8" ry="10" fill="white"/>
  <ellipse cx="115" cy="65" rx="8" ry="10" fill="white"/>
  <circle cx="87" cy="63" r="3" fill="#333"/>
  <circle cx="117" cy="63" r="3" fill="#333"/>
  
  <!-- Antenna -->
  <line x1="100" y1="25" x2="100" y2="45" stroke="url(#grad1)" stroke-width="5"/>
  <circle cx="100" cy="20" r="7" fill="#764ba2" filter="url(#shadow)"/>
  <circle cx="98" cy="18" r="3" fill="white" opacity="0.6"/>
  
  <!-- Body with 3D effect -->
  <rect x="70" y="115" width="60" height="65" rx="8" fill="url(#grad1)" filter="url(#shadow)"/>
  <rect x="73" y="118" width="54" height="59" rx="6" fill="url(#grad1)" opacity="0.6"/>
  
  <!-- Arms -->
  <rect x="45" y="125" width="25" height="12" rx="6" fill="url(#grad1)" filter="url(#shadow)"/>
  <rect x="130" y="125" width="25" height="12" rx="6" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- 3D Database stack on body -->
  <ellipse cx="100" cy="135" rx="15" ry="6" fill="white" opacity="0.8"/>
  <rect x="85" y="135" width="30" height="12" fill="white" opacity="0.6"/>
  <ellipse cx="100" cy="147" rx="15" ry="6" fill="white" opacity="0.7"/>
  <rect x="85" y="147" width="30" height="12" fill="white" opacity="0.5"/>
  <ellipse cx="100" cy="159" rx="15" ry="6" fill="white" opacity="0.6"/>
  
  <!-- Highlight effect -->
  <ellipse cx="85" cy="55" rx="20" ry="15" fill="white" opacity="0.15"/>
</svg>