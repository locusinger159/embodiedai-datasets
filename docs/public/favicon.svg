<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Robot head -->
  <circle cx="50" cy="35" r="25" fill="url(#grad)"/>
  <!-- Eyes -->
  <circle cx="42" cy="32" r="4" fill="white"/>
  <circle cx="58" cy="32" r="4" fill="white"/>
  <!-- Antenna -->
  <line x1="50" y1="10" x2="50" y2="20" stroke="url(#grad)" stroke-width="3"/>
  <circle cx="50" cy="8" r="4" fill="#667eea"/>
  <!-- Body -->
  <rect x="35" y="60" width="30" height="35" rx="5" fill="url(#grad)"/>
  <!-- Arms -->
  <rect x="20" y="65" width="15" height="8" rx="4" fill="url(#grad)"/>
  <rect x="65" y="65" width="15" height="8" rx="4" fill="url(#grad)"/>
  <!-- Database icon on body -->
  <ellipse cx="50" cy="72" rx="8" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="50" cy="80" rx="8" ry="4" fill="white" opacity="0.5"/>
  <ellipse cx="50" cy="88" rx="8" ry="4" fill="white" opacity="0.5"/>
</svg>
