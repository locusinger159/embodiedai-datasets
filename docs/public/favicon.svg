<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Antenna -->
  <line x1="100" y1="18" x2="100" y2="38" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="14" r="6" fill="#7cba6d" stroke="#5a9a4b" stroke-width="1.5"/>

  <!-- Head -->
  <rect x="52" y="40" width="96" height="82" rx="18" fill="#f0f4f8" stroke="#c8d4e0" stroke-width="2.5"/>

  <!-- Eyes -->
  <circle cx="80" cy="76" r="14" fill="#fff" stroke="#c8d4e0" stroke-width="1.5"/>
  <circle cx="80" cy="76" r="7" fill="#5b8def"/>
  <circle cx="78" cy="73" r="3" fill="#fff"/>

  <circle cx="120" cy="76" r="14" fill="#fff" stroke="#c8d4e0" stroke-width="1.5"/>
  <circle cx="120" cy="76" r="7" fill="#5b8def"/>
  <circle cx="118" cy="73" r="3" fill="#fff"/>

  <!-- Mouth (friendly smile) -->
  <path d="M84 100 Q100 116 116 100" fill="none" stroke="#c8d4e0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="82" y="122" width="36" height="14" rx="4" fill="#e8edf2" stroke="#c8d4e0" stroke-width="1.5"/>

  <!-- Body -->
  <rect x="44" y="134" width="112" height="52" rx="16" fill="#f0f4f8" stroke="#c8d4e0" stroke-width="2.5"/>

  <!-- Arms -->
  <rect x="14" y="144" width="30" height="12" rx="6" fill="#e8edf2" stroke="#c8d4e0" stroke-width="1.5"/>
  <rect x="156" y="144" width="30" height="12" rx="6" fill="#e8edf2" stroke="#c8d4e0" stroke-width="1.5"/>

  <!-- Body buttons -->
  <circle cx="100" cy="150" r="5" fill="#7cba6d"/>
  <circle cx="88" cy="166" r="3.5" fill="#5b8def"/>
  <circle cx="100" cy="166" r="3.5" fill="#e8c84a"/>
  <circle cx="112" cy="166" r="3.5" fill="#e8744a"/>
</svg>
